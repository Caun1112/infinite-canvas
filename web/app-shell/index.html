<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
        <title>无限画布</title>
        <style>
            :root {
                color-scheme: dark;
                font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
                background: #111111;
                color: #f5f5f4;
            }

            html,
            body {
                width: 100%;
                height: 100%;
                margin: 0;
                overflow: hidden;
                background: #111111;
            }

            body {
                display: grid;
                place-items: center;
                padding: max(24px, env(safe-area-inset-top)) max(20px, env(safe-area-inset-right)) max(24px, env(safe-area-inset-bottom)) max(20px, env(safe-area-inset-left));
                box-sizing: border-box;
            }

            main {
                max-width: 420px;
                text-align: center;
            }

            h1 {
                margin: 0;
                font-size: 22px;
                font-weight: 650;
                letter-spacing: 0;
            }

            p {
                margin: 14px 0 0;
                color: rgba(245, 245, 244, 0.68);
                font-size: 14px;
                line-height: 1.8;
            }

        </style>
    </head>
    <body>
        <main>
            <h1>正在打开无限画布</h1>
            <p>正在启动应用内置服务，请稍候...</p>
        </main>
    </body>
</html>
